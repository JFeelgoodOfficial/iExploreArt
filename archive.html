<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — iExploreArt</title>
  <meta name="description" content="Every post from The Journal — chronological archive of painting analysis, studio notes, and artist writing by JFeelgood." />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg: #f6f1e8;
      --paper: #fbf8f3;
      --ink: #1e1a17;
      --muted: #6f675f;
      --line: rgba(30,26,23,0.12);
      --accent: #2f6f73;
      --accent-2: #b46f3d;
      --card: #fffdf9;
      --shadow: 0 20px 60px rgba(30,26,23,0.08);
      --radius: 22px;
      --max: 1180px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(180,111,61,0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(47,111,115,0.10), transparent 30%),
        var(--bg);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { width: min(100% - 2rem, var(--max)); margin: 0 auto; }
    h1,h2,h3,h4 { font-family: "Cormorant Garamond", serif; margin: 0 0 1rem; font-weight: 600; }
    h1 { font-size: clamp(3rem,7vw,6rem); line-height: 0.95; letter-spacing:-0.03em; }
    h2 { font-size: clamp(2.4rem,4vw,4rem); line-height: 0.95; }
    h3 { font-size: clamp(1.6rem,2.5vw,2.2rem); line-height: 1.05; }

    /* ── Nav ── */
    .site-header {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(246,241,232,0.82);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem; min-height: 78px;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 0.9rem;
      font-weight: 700; letter-spacing: 0.02em;
    }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 50%;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      background: linear-gradient(145deg,#fffdf9,#efe6d8);
      box-shadow: var(--shadow);
      font-family: "Cormorant Garamond", serif; font-size: 1.15rem;
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-text span:first-child { font-size: 1rem; text-transform: lowercase; }
    .brand-text span:last-child {
      font-size: 0.75rem; color: var(--muted); font-weight: 500;
      margin-top: 0.25rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .nav-links { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
    .nav-links a { color: var(--muted); font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    .nav-cta {
      padding: 0.85rem 1.2rem; border-radius: 999px;
      background: var(--ink); color: #fff !important; font-weight: 600;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.95rem 1.35rem; border-radius: 999px; font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer; font-size: 1rem;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { border-color: var(--line); background: rgba(255,255,255,.55); color: var(--ink); }
    .btn-ghost { border-color: var(--line); background: transparent; color: var(--muted); }

    /* ── Misc ── */
    .eyebrow {
      display: inline-block; padding: 0.45rem 0.8rem;
      border: 1px solid var(--line); border-radius: 999px;
      color: var(--muted); background: rgba(255,255,255,.6);
      font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .meta {
      color: var(--accent-2); text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.78rem; font-weight: 700;
    }
    .section { padding: 5rem 0; }
    footer {
      padding: 2.2rem 0 4rem; color: var(--muted); font-size: 0.95rem;
    }
    .footer-row {
      border-top: 1px solid var(--line); padding-top: 1.5rem;
      display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .footer-links { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .footer-links a { color: var(--muted); }
    .footer-links a:hover { color: var(--ink); }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .nav { flex-direction: column; align-items: flex-start; padding: 1rem 0; }
      .nav-links { gap: 0.8rem; }
    }

    .archive-hero {
      padding: 4rem 0 2.5rem;
      border-bottom: 1px solid var(--line);
    }
    .archive-hero h1 {
      font-size: clamp(3.5rem,8vw,7rem); margin-bottom: .5rem;
    }
    .archive-hero p { color: var(--muted); max-width: 52ch; font-size: 1.05rem; margin: 0; }

    /* Archive list */
    .archive-body { padding: 3.5rem 0 5rem; }
    .archive-inner {
      display: grid; grid-template-columns: 240px 1fr; gap: 4rem; align-items: start;
    }

    /* Year nav */
    .year-nav { position: sticky; top: 100px; }
    .year-nav h4 {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin-bottom: .75rem;
    }
    .year-nav a {
      display: block; padding: .5rem 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted); font-size: .95rem; transition: color .18s;
    }
    .year-nav a:hover, .year-nav a.active { color: var(--accent); font-weight: 600; }

    /* Year group */
    .year-group { margin-bottom: 3rem; }
    .year-label {
      font-family: "Cormorant Garamond",serif;
      font-size: clamp(2.5rem,5vw,4.5rem); line-height: 1;
      color: var(--ink); margin-bottom: 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 2px solid var(--ink);
    }

    /* Post row */
    .post-row {
      display: grid; grid-template-columns: 100px 1fr auto;
      gap: 1.5rem; align-items: baseline;
      padding: 1.1rem 0; border-bottom: 1px solid var(--line);
      transition: background .18s; border-radius: 8px;
    }
    .post-row:hover { background: rgba(255,255,255,.5); padding-left: .5rem; }
    .post-row:last-child { border-bottom: none; }
    .post-date {
      color: var(--muted); font-size: .88rem;
      font-variant-numeric: tabular-nums;
    }
    .post-title { font-family: "Cormorant Garamond",serif; font-size: 1.6rem; line-height: 1.08; }
    .post-title a { transition: color .18s; }
    .post-title a:hover { color: var(--accent); }
    .post-cat {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--accent-2);
      white-space: nowrap;
    }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 2rem; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 1.25rem 1.75rem;
      box-shadow: var(--shadow); margin-bottom: 3rem;
    }
    .stat { text-align: center; }
    .stat strong {
      font-family: "Cormorant Garamond",serif; font-size: 2.2rem;
      display: block; line-height: 1;
    }
    .stat span { font-size: .85rem; color: var(--muted); }

    @media (max-width: 800px) {
      .archive-inner { grid-template-columns: 1fr; }
      .year-nav { position: static; display: flex; gap: 1rem; flex-wrap: wrap; }
      .year-nav a { border-bottom: none; border-right: 1px solid var(--line); padding-right: 1rem; }
      .post-row { grid-template-columns: 1fr; gap: .25rem; }
      .post-date, .post-cat { font-size: .82rem; }
    }
  </style>
</head>
<body>


  <header class="site-header">
    <div class="container nav">
      <a href="index-5.html" class="brand" aria-label="iExploreArt home">
        <span class="brand-mark">iA</span>
        <span class="brand-text">
          <span>iexploreart</span>
          <span>discover art deeply</span>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="about.html">About</a>
        <a href="blog/index.html" class="active">Blog</a>
        <a href="archive.html">Archive</a>
        <a href="https://iexploreart.com/shop" target="_blank">Shop</a>
        <a href="blog/index.html" class="nav-cta">Start Exploring</a>
      </nav>
    </div>
  </header>


  <main>
    <div class="archive-hero">
      <div class="container">
        <span class="eyebrow">Complete Archive</span>
        <h1>Every post.</h1>
        <p>All writing from The Journal — chronological, complete, and searchable.</p>
      </div>
    </div>

    <div class="archive-body">
      <div class="container">
        <div class="stats-bar" id="statsBar"></div>
        <div class="archive-inner">
          <nav class="year-nav" aria-label="Jump to year" id="yearNav"></nav>
          <div id="archiveList"></div>
        </div>
      </div>
    </div>
  </main>


  <footer>
    <div class="container footer-row">
      <span>© 2026 iExploreArt · JFeelgood</span>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="blog/index.html">Blog</a>
        <a href="archive.html">Archive</a>
        <a href="https://iexploreart.com/shop" target="_blank">Shop</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
      </div>
    </div>
  </footer>


  <script src="posts.js"></script>
  <script>
    const sorted = [...POSTS].sort((a,b) => new Date(b.date) - new Date(a.date));

    // Group by year
    const byYear = {};
    sorted.forEach(p => {
      const y = p.date.slice(0,4);
      if (!byYear[y]) byYear[y] = [];
      byYear[y].push(p);
    });
    const years = Object.keys(byYear).sort((a,b) => b-a);

    // Stats
    const cats = [...new Set(POSTS.map(p => p.category))];
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><strong>${POSTS.length}</strong><span>Posts</span></div>
      <div class="stat"><strong>${years.length}</strong><span>Year${years.length!==1?'s':''}</span></div>
      <div class="stat"><strong>${cats.length}</strong><span>Categories</span></div>
      <div class="stat"><strong>${POSTS.reduce((s,p)=>s+parseInt(p.readTime),0)}</strong><span>Min of writing</span></div>`;

    // Year nav
    document.getElementById('yearNav').innerHTML =
      '<h4>Jump to</h4>' +
      years.map(y => `<a href="#year-${y}">${y}</a>`).join('');

    // Archive list
    document.getElementById('archiveList').innerHTML = years.map(y => `
      <div class="year-group" id="year-${y}">
        <div class="year-label">${y}</div>
        ${byYear[y].map(p => `
          <div class="post-row">
            <div class="post-date">${p.dateDisplay.replace(/, \d{4}/,'')}</div>
            <div class="post-title">
              <a href="${p.url}" ${p.url.startsWith('http')?'target="_blank" rel="noopener"':''}>${p.title}</a>
            </div>
            <div class="post-cat">${p.category}</div>
          </div>`).join('')}
      </div>`).join('');

    // Active year on scroll
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          document.querySelectorAll('.year-nav a').forEach(a => a.classList.remove('active'));
          const link = document.querySelector(`.year-nav a[href="#${e.target.id}"]`);
          if (link) link.classList.add('active');
        }
      });
    }, {threshold: 0.3});
    document.querySelectorAll('.year-group').forEach(el => observer.observe(el));
  </script>
</body>
</html>
