<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — iExploreArt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg: #f6f1e8;
      --paper: #fbf8f3;
      --ink: #1e1a17;
      --muted: #6f675f;
      --line: rgba(30,26,23,0.12);
      --accent: #2f6f73;
      --accent-2: #b46f3d;
      --card: #fffdf9;
      --shadow: 0 20px 60px rgba(30,26,23,0.08);
      --radius: 22px;
      --max: 1180px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(180,111,61,0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(47,111,115,0.10), transparent 30%),
        var(--bg);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .container { width: min(100% - 2rem, var(--max)); margin: 0 auto; }
    h1,h2,h3,h4 { font-family: "Cormorant Garamond", serif; margin: 0 0 1rem; font-weight: 600; }
    h1 { font-size: clamp(3rem,7vw,6rem); line-height: 0.95; letter-spacing:-0.03em; }
    h2 { font-size: clamp(2.4rem,4vw,4rem); line-height: 0.95; }
    h3 { font-size: clamp(1.6rem,2.5vw,2.2rem); line-height: 1.05; }

    /* ── Nav ── */
    .site-header {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(246,241,232,0.82);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem; min-height: 78px;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 0.9rem;
      font-weight: 700; letter-spacing: 0.02em;
    }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 50%;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      background: linear-gradient(145deg,#fffdf9,#efe6d8);
      box-shadow: var(--shadow);
      font-family: "Cormorant Garamond", serif; font-size: 1.15rem;
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-text span:first-child { font-size: 1rem; text-transform: lowercase; }
    .brand-text span:last-child {
      font-size: 0.75rem; color: var(--muted); font-weight: 500;
      margin-top: 0.25rem; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .nav-links { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
    .nav-links a { color: var(--muted); font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    .nav-cta {
      padding: 0.85rem 1.2rem; border-radius: 999px;
      background: var(--ink); color: #fff !important; font-weight: 600;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.95rem 1.35rem; border-radius: 999px; font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer; font-size: 1rem;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { border-color: var(--line); background: rgba(255,255,255,.55); color: var(--ink); }
    .btn-ghost { border-color: var(--line); background: transparent; color: var(--muted); }

    /* ── Misc ── */
    .eyebrow {
      display: inline-block; padding: 0.45rem 0.8rem;
      border: 1px solid var(--line); border-radius: 999px;
      color: var(--muted); background: rgba(255,255,255,.6);
      font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .meta {
      color: var(--accent-2); text-transform: uppercase;
      letter-spacing: 0.08em; font-size: 0.78rem; font-weight: 700;
    }
    .section { padding: 5rem 0; }
    footer {
      padding: 2.2rem 0 4rem; color: var(--muted); font-size: 0.95rem;
    }
    .footer-row {
      border-top: 1px solid var(--line); padding-top: 1.5rem;
      display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .footer-links { display: flex; gap: 1.25rem; flex-wrap: wrap; }
    .footer-links a { color: var(--muted); }
    .footer-links a:hover { color: var(--ink); }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .nav { flex-direction: column; align-items: flex-start; padding: 1rem 0; }
      .nav-links { gap: 0.8rem; }
    }

    .cat-hero {
      padding: 4rem 0 2.5rem;
      border-bottom: 1px solid var(--line);
    }
    .cat-hero .back {
      display: inline-flex; align-items: center; gap: .5rem;
      color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem;
      transition: color .18s;
    }
    .cat-hero .back:hover { color: var(--ink); }
    .cat-hero h1 {
      font-size: clamp(3rem,7vw,6rem); line-height: .95;
      letter-spacing: -.03em; margin-bottom: .75rem;
    }
    .cat-hero p { color: var(--muted); max-width: 58ch; font-size: 1.05rem; margin: 0; }
    .cat-count {
      display: inline-block; padding: .4rem .85rem;
      border-radius: 999px; border: 1px solid var(--line);
      background: rgba(255,255,255,.6); font-size: .82rem;
      color: var(--muted); margin-top: 1rem;
    }

    /* All categories strip */
    .cat-strip {
      padding: 1.25rem 0;
      display: flex; flex-wrap: wrap; gap: .6rem;
      border-bottom: 1px solid var(--line);
    }
    .cat-strip a {
      padding: .42rem 1rem; border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.55);
      font-size: .85rem; color: var(--muted);
      transition: all .18s;
    }
    .cat-strip a:hover, .cat-strip a.active {
      background: var(--ink); color: #fff; border-color: var(--ink);
    }

    /* Grid */
    .posts-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem;
      padding: 3rem 0;
    }
    .post-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); transition: transform .2s;
      display: flex; flex-direction: column;
    }
    .post-card:hover { transform: translateY(-4px); }
    .post-thumb {
      aspect-ratio: 4/3;
      background: linear-gradient(135deg,rgba(47,111,115,.15),rgba(180,111,61,.15));
      display: grid; place-items: center;
      font-family: "Cormorant Garamond",serif;
      font-size: 1.4rem; color: var(--ink); padding: 1.2rem; text-align: center;
    }
    .post-thumb img { width:100%; height:100%; object-fit:cover; }
    .post-body { padding: 1.3rem; flex:1; display:flex; flex-direction:column; }
    .post-body h3 { font-size: 1.65rem; margin-bottom: .5rem; line-height: 1.08; }
    .post-body p { color: var(--muted); font-size: .95rem; flex:1; margin-bottom: 1rem; }
    .post-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: .75rem; border-top: 1px solid var(--line);
    }
    .post-footer .date { color: var(--muted); font-size: .82rem; }
    .read-link { color: var(--accent); font-weight: 700; font-size: .9rem; }
    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 1rem; color: var(--muted);
    }
    .empty h3 { color: var(--ink); }

    @media (max-width: 900px) { .posts-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .posts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>


  <header class="site-header">
    <div class="container nav">
      <a href="../index-5.html" class="brand" aria-label="iExploreArt home">
        <span class="brand-mark">iA</span>
        <span class="brand-text">
          <span>iexploreart</span>
          <span>discover art deeply</span>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="../about.html">About</a>
        <a href="index.html" class="active">Blog</a>
        <a href="../archive.html">Archive</a>
        <a href="https://iexploreart.com/shop" target="_blank">Shop</a>
        <a href="index.html" class="nav-cta">Start Exploring</a>
      </nav>
    </div>
  </header>


  <main>
    <div class="cat-hero">
      <div class="container">
        <a href="index.html" class="back">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          All Posts
        </a>
        <div class="meta" id="catLabel"></div>
        <h1 id="catTitle">Category</h1>
        <p id="catDesc"></p>
        <span class="cat-count" id="catCount"></span>
      </div>
    </div>

    <div class="container">
      <div class="cat-strip" id="catStrip"></div>
      <div class="posts-grid" id="postsGrid"></div>
    </div>
  </main>


  <footer>
    <div class="container footer-row">
      <span>© 2026 iExploreArt · JFeelgood</span>
      <div class="footer-links">
        <a href="../about.html">About</a>
        <a href="index.html">Blog</a>
        <a href="../archive.html">Archive</a>
        <a href="https://iexploreart.com/shop" target="_blank">Shop</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
      </div>
    </div>
  </footer>


  <script src="../posts.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const cat = params.get('cat') || CATEGORIES[0];

    document.title = cat + ' — iExploreArt';
    document.getElementById('catLabel').textContent = 'Category';
    document.getElementById('catTitle').textContent = cat;
    document.getElementById('catDesc').textContent = CATEGORY_DESCRIPTIONS[cat] || '';

    const filtered = POSTS.filter(p => p.category === cat);
    document.getElementById('catCount').textContent = filtered.length + ' post' + (filtered.length !== 1 ? 's' : '');

    // Category strip
    document.getElementById('catStrip').innerHTML =
      CATEGORIES.map(c => `<a href="category.html?cat=${encodeURIComponent(c)}" class="${c===cat?'active':''}">${c}</a>`).join('');

    // Grid
    if (!filtered.length) {
      document.getElementById('postsGrid').innerHTML = `
        <div class="empty"><h3>Nothing here yet</h3><p>Posts in this category are coming soon.</p></div>`;
    } else {
      document.getElementById('postsGrid').innerHTML = filtered.map(p => `
        <a href="${p.url}" class="post-card" ${p.url.startsWith('http')?'target="_blank" rel="noopener"':''}>
          <div class="post-thumb">${p.thumb ? `<img src="${p.thumb}" alt="${p.title}" />` : p.title}</div>
          <div class="post-body">
            <div class="meta" style="margin-bottom:.5rem">${p.category}</div>
            <h3>${p.title}</h3>
            <p>${p.excerpt}</p>
            <div class="post-footer">
              <span class="date">${p.dateDisplay}</span>
              <span class="read-link">${p.readTime} read →</span>
            </div>
          </div>
        </a>`).join('');
    }
  </script>
</body>
</html>
